<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nova Notifier</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
    margin:0;
    background:#0b0f14;
    color:#e5e7eb;
    font-family: monospace;
}

.header {
    text-align:center;
    padding:15px;
    font-size:20px;
    color:#00d4ff;
}

.terminal {
    width:90%;
    height:85vh;
    margin:auto;
    background:#0f141a;
    border-radius:10px;
    border:1px solid #222;
    display:flex;
    flex-direction:column;
}

.topbar {
    padding:10px;
    font-size:12px;
    color:#888;
    border-bottom:1px solid #222;
}

.logs {
    flex:1;
    overflow:auto;
    padding:10px;
}

.log {
    margin-bottom:10px;
    padding:10px;
    background:#111;
    border-left:3px solid #3b82f6;
    border-radius:6px;
    animation:fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(5px);}
    to {opacity:1; transform:translateY(0);}
}

.sender { color:#facc15; }
.title { color:#60a5fa; }
.desc { color:#d1d5db; }
.fields { color:#9ca3af; white-space:pre-wrap; }
</style>
</head>

<body>

<div class="header">Nova Notifier</div>

<div class="terminal">
    <div class="topbar">LIVE LOGS</div>
    <div class="logs" id="logs"></div>
</div>

<script>
const socket = io();

socket.on("new_log", (data) => {
    const div = document.createElement("div");
    div.className = "log";

    div.innerHTML = `
        <div class="sender">📡 ${data.sender}</div>
        <div class="title">⭐ ${data.title}</div>
        <div class="desc">${data.description}</div>
        <div class="fields">${data.fields || ""}</div>
    `;

    document.getElementById("logs").prepend(div);
});
</script>

</body>
</html>
